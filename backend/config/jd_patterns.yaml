experience:
  pattern: "(\\d+)\\+?\\s*(?:-|to)\\s*(\\d+)?\\s*years?|(\\d+)\\+?\\s*years?"
salary:
  pattern: "\\$?\\s*(\\d{2,3}[kK]|\\d{1,3}(?:,\\d{3})+)\\s*(?:-|to)\\s*\\$?\\s*(\\d{2,3}[kK]|\\d{1,3}(?:,\\d{3})+)|\\$?\\s*(\\d{2,3}[kK]|\\d{1,3}(?:,\\d{3})+)\\s*\\/\\s*(?:yr|year|month|hr|hour)"
employment_type:
  patterns:
    - "full\\-time"
    - "part\\-time"
    - "contract"
    - "internship"
    - "freelance"
    - "temporary"
location_type:
  patterns:
    - "remote"
    - "hybrid"
    - "onsite"
    - "on-site"
degree_requirements:
  patterns:
    - "bachelor'?s"
    - "master'?s"
    - "phd"
    - "b\\.?s\\.?"
    - "m\\.?s\\.?"
    - "b\\.?a\\.?"
    - "m\\.?a\\.?"
    - "computer science"
    - "engineering"
visa:
  patterns:
    - "visa sponsorship"
    - "no visa sponsorship"
    - "h1b"
    - "us citizen"
    - "green card"
