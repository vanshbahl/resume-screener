date_patterns:
  present_keywords:
    - "present"
    - "current"
    - "now"
  formats:
    mm_yyyy: "^(0?[1-9]|1[0-2])/\\d{4}$"
    yyyy: "^\\d{4}$"
    mon_yyyy: "^(january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|oct|nov|dec)[-\\s]\\d{4}$"
